<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario</title>
</head>
<body bgcolor="#D8BFD8">
    <h1>Exemplo de formulario</h1>
    <form>                    <!--todas as caixas do formulario precisam estar na tag form -->
        <label> nome:</label>
        <input type="text"><br><br> <!--para abrir uma caixinha de texto-->

        <label> senha</label>
        <input type="password"><br><br>

        <label>sugestao</label>
        <textarea rows="3" cols="8 " maxlength="6" minlength="5"> </textarea> <br><br><!--maxlength quantidade de caracteres que pode inserir--> <!--minlength para quantidade minima-->
                  
        <select> <!--adiciona menu de opcao-->
            <option>cabrito cabeludo</option> <!--botoar as opcoes-->
            <option>careca</option>
        </select><br><br>

        <label>Opção: </label>
        <input type="radio" name="Opção" checked> <!--checked para deixar padrao onde sempre fica amrcado quando atualiazar-->
        <label>chinpanze amarelo</label>
        <input type="radio" name="Opção"> <!--bolinha para marcar "radio"-->
        <label>chinelo sem pé</label>
        <input type="radio" name="Opção">
        <label>chinelo com pé</label>
        <br><br>
        <label>preferencia: </label>
        <label>rapunzel</label>
        <input type="checkbox">   <!--checkbox para marcar no quaradinho-->
        <label>raimundo</label>
        <input type="checkbox">
        <label>ratinho</label>
        <input type="checkbox">
        <br><br>
        <label>co</label>
        <input type="color"> <!--bota um quadrado com cor-->
        <br><br>
        <label>date</label> <!-- pra selecionar uma data-->
        <input type="date">
        <br><br>
        <label>ku</label>
        <input type="datetime-local"> <!--bora data e hora-->
        <br><br>
        <label>email</label> <!--bota email-->
        <input type="email">
        <br><br>
        <label>arquivu</label> <!--selecionar arquivo-->
        <input type="file">
        <br><br>
        <label>fotu</label>
        <input type="image" src="rosa1av.png" width="100" height="50"> <!--colocar e selecionar imageeeeeem-->
        <br><br>
        <label>sss</label>
        <input type="month">  <!--deve <ser para colocar data-->
        <br><br>
        <label>numeru</label>
        <input type="number"> <!--numero e colocar valor-->
        <br><br>
        <label>aaaaa</label>
        <input type="range"> <!--arrastar bolinha de distancia-->
        <br><br>

        


        <br><br><br>
        <button>churisso</button> <!--botao de enviar -->
        


      

    </form>
    
</body>
</html>
