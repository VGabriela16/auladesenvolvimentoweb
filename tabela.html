<!DOCTYPE html>                                                           <!-- alt + shift +a para criar comentario-->
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tabela</title>
</head>
<body>
    <table border="20%" width="100%" align="center" bgcolor="#ADD8E6" cellpadding="8px" cellspacing="3">  <!-- table cria uma tabela --> <!-- cellpadding dentro da celula --> 
    <!-- cellspacing espaco de fora da celula   -->  
        <tr>                        <!-- cria uma linha na tabela -->
            <td bgcolor="#B0C4DE">celula 1</td> 
            <td > celula 2</td>
            <td bg>celula 3</td>                      <!-- um quadradinho "celula" -->
        </tr>    <!-- fechando o tr cria outra linha -->

        <tr>
            <td bgcolor="#F5DEB3">celula 2</td>
        </tr>
        <tr>
            <td bgcolor="#FFB6C1" colspan="90">celula 3</td>  
        </tr>
    </table>
        
</body>
</html>
